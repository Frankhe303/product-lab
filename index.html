*,*::after,*::before{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--bg-card:rgba(12,20,35,.85);--bg-hover:rgba(18,30,50,.95);--line:rgba(0,180,255,.12);--line-act:rgba(0,212,255,.5);--cyan:#00d4ff;--cyand:rgba(0,212,255,.6);--cyans:rgba(0,212,255,.12);--blue:#0088ff;--purple:#7c3aed;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--orange:#f97316;--pink:#ec4899;--txt:#e2e8f0;--txtd:#94a3b8;--txtm:#64748b;--sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
html{scroll-behavior:smooth}

.bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,212,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03)1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.glow{position:fixed;width:600px;height:600px;border-radius:50%;filter:blur(150px);pointer-events:none;z-index:0;animation:gp 8s ease infinite alternate}
.g1{top:-200px;right:-200px;background:radial-gradient(circle,rgba(0,100,255,.06),transparent)}
.g2{bottom:-200px;left:-200px;background:radial-gradient(circle,rgba(124,58,237,.05),transparent);animation-delay:-4s}
@keyframes gp{0%,100%{opacity:.5}50%{opacity:1}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--cyans);border-radius:3px}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:.8rem 2rem;background:linear-gradient(180deg,rgba(6,8,15,.95),transparent);display:flex;justify-content:space-between;align-items:center}
nav .logo{font-weight:700;font-size:1rem;background:linear-gradient(135deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;webkit-font-smoothing:antialiased}
.hero{z-index:1;min-height:60vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:2rem}

.hero .stat{background:var(--bg-card);border:1px solid var(--line);border-radius:12px;padding:.7rem 1.3rem;min-width:80px}
.hero .stat .n{font-size:1.2rem;font-weight:700;color:var(--cyan);font-family:var(--mono)}
.hero .stat .l{font-size:.62rem;color:var(--txtm);margin-top:.1rem;text-transform:uppercase;letter-spacing:.05em}

.filter-bar{display:flex;justify-content:center;gap:.5rem;margin-bottom:2rem;flex-wrap:wrap}

.filter-bar button.active,.filter-bar button:hover{background:var(--cyans);border-color:var(--cyand);color:var(--cyan)}

.card{background:var(--bg-card);border:1px solid var(--line);border-radius:14px;padding:1.3rem;transition:all .4s;cursor:pointer;position:relative}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.8rem}

.dmcard .dn .unit{font-size:.7rem;font-weight:400;color:var(--txtm)}
.dmcard .ds{font-size:.7rem;color:var(--txtd);line-height:1.5}

.dfull .dc{font-size:.74rem;color:var(--txtd);line-height:1.7}

.info-bar{z-index:1;max-width:600px;margin:0 auto 3rem;padding:1.2rem 1.5rem;background:var(--bg-card);border:1px solid var(--line);border-radius:14px;display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center}

.info-bar .item .l{font-size:.62rem;color:var(--txtm);margin-top:.2rem}

.foot{z-index:1;text-align:center;padding:2rem;color:var(--txtm);font-size:.7rem;border-top:1px solid rgba(255,255,255,.03)}

var curFilter='all';

function filter(f){
  curFilter=f;
  document.querySelectorAll('.filter-bar button').forEach(function(b,i){
    b.classList.toggle('active',f==='all'&&i===0||f==='boom'&&i===1||f==='patent'&&i===2||f==='both'&&i===3);
  });
  render();
}

function toggleCard(e){
  var card=e.currentTarget;
  card.classList.toggle('expanded');
}

function makeCard(id,d){
  var cls=d.rc==='gold'?'rank gold':d.rc==='silver'?'rank silver':'rank normal';
  var rankText=d.r===1?'TOP 1':d.r===2?'TOP 2':d.r===3?'TOP 3':'#'+d.r;
  var tagsHTML=d.tg.map(function(t){return t==='boom'?'<span class="boom">&#128165; 爆品</span>':'<span class="patent">&#128220; 专利</span>';}).join('');
  return '<div class="card" data-id="'+id+'" data-tags="'+d.tg.join(',')+'" onclick="toggleCard(event)">'+
    '<div class="card-top"><span class="'+cls+'">'+rankText+'</span><span class="icon">'+d.icon+'</span></div>'+
    '<h3>'+d.name+'</h3>'+
    '<div class="tagline">'+d.tag+'</div>'+
    '<div class="metrics"><span>BOM <b>¥'+d.bom+'</b></span><span>售价 <b>¥'+d.price+'</b></span><span>净利 <b>¥'+d.profit+'</b></span></div>'+
    '<div class="tags">'+tagsHTML+'</div>'+
    '<div class="card-detail">'+
      '<div class="detail-grid">'+
        '<div class="dmcard"><div class="dl">BOM 成本</div><div class="dn">¥'+d.bom+'<span class="unit">/套</span></div></div>'+
        '<div class="dmcard"><div class="dl">建议售价</div><div class="dn">¥'+d.price+'<span class="unit">/套</span></div></div>'+
        '<div class="dmcard"><div class="dl">100 套预估利润</div><div class="dn">¥'+d.profit+'<span class="unit"> 元</span></div><div class="ds">利润率 '+d.margin+'</div></div>'+
        '<div class="dmcard"><div class="dl">目标用户</div><div class="ds">'+d.u+'</div></div>'+
      '</div>'+
      '<div class="dfull"><div class="dl">独特卖点 (USP)</div><div class="dc">'+d.usp+'</div></div>'+
      '<div class="dfull"><div class="dl">竞品格局</div><div class="dc">'+d.comp+'</div></div>'+
      '<div class="dfull"><div class="dl">AI 可以做什么</div><div class="dc">'+d.ai+'</div></div>'+
      '<div class="dfull"><div class="dl">专利评估</div><div class="dc">'+d.patent+'</div></div>'+
      '<div class="dfull"><div class="dl">风险评估</div><div class="dc">'+d.risk+'</div></div>'+
    '</div>'+
    '<div class="expand-hint">▲ 点击收起</div>'+
  '</div>';
}

function render(){
  var html='';
  var keys=['decibel','posture','angle','dog-collar','solder','thermo','powermeter','eink-clock','luggage','soil'];
  for(var i=0;i<keys.length;i++){
    var d=DATA[keys[i]];
    if(curFilter==='all'||d.tg.indexOf(curFilter)>-1) html+=makeCard(keys[i],d);
  }
  document.getElementById('cards').innerHTML=html;
}
render();
</script>
