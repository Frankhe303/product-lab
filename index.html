<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>产品实验室 · 10 个小硬件产品方案</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
*,*::after,*::before{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--bg-card:rgba(12,20,35,.85);--bg-hover:rgba(18,30,50,.95);--line:rgba(0,180,255,.12);--line-act:rgba(0,212,255,.5);--cyan:#00d4ff;--cyand:rgba(0,212,255,.6);--cyans:rgba(0,212,255,.12);--blue:#0088ff;--purple:#7c3aed;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--orange:#f97316;--pink:#ec4899;--txt:#e2e8f0;--txtd:#94a3b8;--txtm:#64748b;--sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);line-height:1.6;overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,212,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03)1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.glow{position:fixed;width:600px;height:600px;border-radius:50%;filter:blur(150px);pointer-events:none;z-index:0;animation:gp 8s ease infinite alternate}
.g1{top:-200px;right:-200px;background:radial-gradient(circle,rgba(0,100,255,.06),transparent)}
.g2{bottom:-200px;left:-200px;background:radial-gradient(circle,rgba(124,58,237,.05),transparent);animation-delay:-4s}
@keyframes gp{0%,100%{opacity:.5}50%{opacity:1}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--cyans);border-radius:3px}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:.8rem 2rem;background:linear-gradient(180deg,rgba(6,8,15,.95),transparent)}
nav .logo{font-weight:700;font-size:1rem;background:linear-gradient(135deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero{z-index:1;padding:6rem 2rem 3rem;text-align:center}
.hero .badge{display:inline-block;background:var(--cyans);border:1px solid var(--cyand);color:var(--cyan);padding:.3rem .8rem;border-radius:20px;font-size:.7rem;font-family:var(--mono);margin-bottom:1.5rem;letter-spacing:.05em}
.hero h1{font-size:clamp(2rem,5vw,3rem);font-weight:800;margin-bottom:.6rem;background:linear-gradient(135deg,#fff,var(--cyan),var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:.95rem;color:var(--txtd);margin-bottom:2rem;font-weight:300}
.hero .stats{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;margin-bottom:1rem}
.hero .stat{background:var(--bg-card);border:1px solid var(--line);border-radius:12px;padding:.7rem 1.3rem;min-width:80px}
.hero .stat .n{font-size:1.2rem;font-weight:700;color:var(--cyan);font-family:var(--mono)}
.hero .stat .l{font-size:.62rem;color:var(--txtm);margin-top:.1rem;text-transform:uppercase;letter-spacing:.05em}

.section{z-index:1;max-width:1200px;margin:0 auto;padding:2rem 2rem 4rem}
.section h2{text-align:center;font-size:clamp(1.3rem,2.5vw,1.7rem);font-weight:700;margin-bottom:2rem}
.section h2 small{display:block;font-size:.7rem;font-weight:300;color:var(--txtd);margin-top:.3rem}

.pipeline{display:flex;justify-content:center;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:2rem;padding:.8rem 1rem;background:var(--bg-card);border-radius:14px;border:1px solid var(--line)}
.pipeline .ps{text-align:center;min-width:50px}
.pipeline .ps .pi{font-size:1.2rem}
.pipeline .ps .pl{font-size:.55rem;color:var(--txtm);font-family:var(--mono);margin-top:.1rem}
.pipeline .pa{color:var(--cyand);font-size:.7rem}

.filter-bar{display:flex;justify-content:center;gap:.5rem;margin-bottom:2rem;flex-wrap:wrap}
.filter-bar button{background:var(--bg-card);border:1px solid var(--line);color:var(--txtd);padding:.4rem 1rem;border-radius:20px;cursor:pointer;font-size:.72rem;font-family:var(--sans);transition:all .3s}
.filter-bar button.active,.filter-bar button:hover{background:var(--cyans);border-color:var(--cyand);color:var(--cyan)}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1rem}
.card{background:var(--bg-card);border:1px solid var(--line);border-radius:16px;padding:1.4rem;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:all .4s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyans),transparent);opacity:0;transition:opacity .4s}
.card:hover{background:var(--bg-hover);border-color:var(--line-act);transform:translateY(-4px);box-shadow:0 12px 50px rgba(0,212,255,.08)}
.card:hover::before{opacity:1}
.card .ct{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem}
.card .rank{font-size:.64rem;font-family:var(--mono);padding:.2rem .6rem;border-radius:10px;color:var(--txtd);background:rgba(148,163,184,.08)}
.card .rank.gold{background:rgba(245,158,11,.15);color:var(--amber)}
.card .rank.silver{background:rgba(148,163,184,.1);color:var(--txtd)}
.card .icon{font-size:1.7rem}
.card h3{font-size:.98rem;font-weight:600;margin-bottom:.2rem}
.card .tagline{font-size:.72rem;color:var(--txtd);margin-bottom:.7rem;line-height:1.4}
.card .metrics{display:flex;gap:.7rem;margin-bottom:.6rem;flex-wrap:wrap}
.card .metrics span{font-size:.64rem;font-family:var(--mono);color:var(--txtm)}
.card .metrics span b{color:var(--cyan);font-weight:600}
.card .tags{display:flex;gap:.4rem}
.card .tags span{font-size:.6rem;padding:.15rem .5rem;border-radius:10px;font-family:var(--mono)}
.card .tags .boom{color:var(--amber);background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2)}
.card .tags .patent{color:var(--pink);background:rgba(236,72,153,.1);border:1px solid rgba(236,72,153,.2)}
.card .arrow{text-align:right;margin-top:auto;padding-top:.5rem;color:var(--cyand);font-size:.8rem;opacity:0;transition:opacity .4s}
.card:hover .arrow{opacity:1}

.info-bar{z-index:1;max-width:600px;margin:0 auto 3rem;padding:1rem 1.5rem;background:var(--bg-card);border:1px solid var(--line);border-radius:14px;display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center}
.info-bar .item{text-align:center}
.info-bar .item .v{font-size:1.1rem;font-weight:700;font-family:var(--mono)}
.info-bar .item .v.a{color:var(--amber)}
.info-bar .item .v.b{color:var(--pink)}
.info-bar .item .l{font-size:.6rem;color:var(--txtm);margin-top:.2rem}

.foot{z-index:1;text-align:center;padding:2rem;color:var(--txtm);font-size:.7rem;border-top:1px solid rgba(255,255,255,.03)}
@media(max-width:768px){.cards{grid-template-columns:1fr}.section{padding:1.5rem 1rem}}
</style>
</head>
<body>
<div class="bg"></div><div class="glow g1"></div><div class="glow g2"></div>
<nav><div class="logo">&#9670; Product Lab</div></nav>

<section class="hero">
  <div class="badge">AI-ASSISTED HARDWARE LAB</div>
  <h1>产品实验室</h1>
  <p>用 AI 辅助设计硬件产品 · 每个方案含市场调研、BOM 拆解、概念图</p>
  <div class="stats">
    <div class="stat"><div class="n">10</div><div class="l">候选方案</div></div>
    <div class="stat"><div class="n">&lt;¥40</div><div class="l">BOM 成本</div></div>
    <div class="stat"><div class="n">¥59-129</div><div class="l">售价区间</div></div>
    <div class="stat"><div class="n">30-52%</div><div class="l">利润率</div></div>
  </div>
</section>

<section class="section">
  <h2>10 个候选产品方案<small>点击任一卡片进入完整调研页面 · 含概念图、竞品、专利评估</small></h2>
  <div class="pipeline">
    <div class="ps"><div class="pi">💡</div><div class="pl">想法</div></div><div class="pa">→</div>
    <div class="ps"><div class="pi">🔍</div><div class="pl">调研</div></div><div class="pa">→</div>
    <div class="ps"><div class="pi">🤖</div><div class="pl">AI 设计</div></div><div class="pa">→</div>
    <div class="ps"><div class="pi">🔧</div><div class="pl">样机</div></div><div class="pa">→</div>
    <div class="ps"><div class="pi">🏭</div><div class="pl">代工</div></div><div class="pa">→</div>
    <div class="ps"><div class="pi">💰</div><div class="pl">销售</div></div>
  </div>
  <div class="filter-bar">
    <button class="active" onclick="filter('all')">全部</button>
    <button onclick="filter('boom')">🔥 爆品</button>
    <button onclick="filter('patent')">📜 专利</button>
    <button onclick="filter('both')">🚀 双重</button>
  </div>
  <div class="cards" id="cards"></div>
</section>

<div class="info-bar">
  <div class="item"><div class="v a">6 个</div><div class="l">爆品路线</div></div>
  <div class="item"><div class="v b">7 个</div><div class="l">可专利点</div></div>
  <div class="item"><div class="v a">3 个</div><div class="l">双重覆盖</div></div>
</div>

<footer class="foot"><p>Product Lab &middot; AI-Assisted Hardware &middot; 每次讨论后更新 &copy; 2025</p></footer>

<script>
var D=[
{id:'decibel',r:1,rc:'gold',icon:'🔉',name:'迷你数字分贝仪',tg:'口袋噪声计 · OLED + emoji + 婴儿模式',b:32,p:129,pr:6415,m:'50%',tg2:['boom','patent']},
{id:'posture',r:2,rc:'silver',icon:'🧘',name:'智能姿态提醒器',tg:'不用 App · 夹衣领防驼背振动提醒',b:25.5,p:119,pr:6215,m:'52%',tg2:['boom','patent']},
{id:'angle',r:3,rc:'silver',icon:'📐',name:'迷你数字角度仪',tg:'磁吸底座 · OLED 仿真水平仪 · 蜂鸣播报',b:35,p:129,pr:5965,m:'46%',tg2:['patent']},
{id:'dog-collar',r:4,icon:'🐕',name:'LED 宠物夜光项圈',tg:'USB 充电 · 随运动闪动 · 遥控找狗',b:29,p:99,pr:4115,m:'42%',tg2:['boom']},
{id:'solder',r:5,icon:'🔧',name:'迷你 T12 焊台',tg:'Type-C PD 供电 · 手掌大小 · PID 温控',b:33,p:99,pr:4800,m:'42%',tg2:['patent']},
{id:'thermo',r:6,icon:'🍔',name:'2秒速测烧烤温度计',tg:'折叠探针 · OLED 温度曲线 · 磁吸贴烤炉',b:30.5,p:89,pr:3215,m:'36%',tg2:['boom']},
{id:'powermeter',r:7,icon:'⚡',name:'USB 迷你功率计',tg:'Type-C 直插 · OLED 四合一 · V/A/W/电量',b:21.5,p:59,pr:3000,m:'44%',tg2:['boom','patent']},
{id:'eink-clock',r:8,icon:'🕳️',name:'E-Ink 温湿度时钟',tg:'护眼不发光 · 纽扣电池半年 · 极简日系',b:26,p:79,pr:3400,m:'43%',tg2:['boom']},
{id:'luggage',r:9,icon:'🛗',name:'迷你数字行李秤',tg:'航司限额预置 · 超重红/绿 LED · 手掌大小',b:25,p:69,pr:2265,m:'33%',tg2:['patent']},
{id:'soil',r:10,icon:'🌱',name:'3合1 土壤检测仪',tg:'湿度/pH/光照 · 拔出保留读数 · 笑脸指数',b:21.5,p:59,pr:1815,m:'31%',tg2:['boom']}
{id:'pill-cap',r:11,icon:'💊',name:'智能药瓶计时盖',tg:'替换标准药瓶盖 · LCD 显示上次开盖时间 · 定时蜂鸣提醒',b:20,p:89,pr:4800,m:'54%',tg2:['boom', 'patent']},
{id:'spoon-scale',r:12,icon:'🥄',name:'数字称重量勺',tg:'挖一勺同时称重 · 0.1g 精度 · 双头可换 · USB-C 充电',b:33,p:109,pr:5200,m:'48%',tg2:['boom']},
{id:'jump-rope',r:13,icon:'🏃',name:'霍尔感应智能跳绳',tg:'霍尔效应精准计数 · LCD 屏 · 蓝牙同步 · 比机械式准 10 倍',b:34,p:89,pr:3500,m:'39%',tg2:['boom']},
{id:'laser-measure',r:14,icon:'📏',name:'钥匙扣激光测距仪',tg:'火柴盒大小 · 30m 量程 · 铝合金 CNC · USB-C 充电',b:36.5,p:129,pr:5500,m:'43%',tg2:['patent']},
{id:'hand-warmer',r:15,icon:'🔥',name:'数显双面暖手宝',tg:'LCD 实时温度显示 · 双面加热 · 兼做充电宝 · PID 恒温',b:34,p:89,pr:3500,m:'39%',tg2:['boom']},
{id:'eco2',r:16,icon:'🌬️',name:'便携 eCO2 空气监测仪',tg:'VOC 估算 CO2 · 交通灯环显示 · 超标蜂鸣提醒',b:39,p:149,pr:6800,m:'46%',tg2:['boom', 'patent']},
{id:'uv-toothbrush',r:17,icon:'🪥',name:'感应式 UV 牙刷消毒器',tg:'人体感应自动启动 · 微型风扇干燥 · 倒计时显示 · 磁吸壁挂',b:38.5,p:119,pr:5200,m:'44%',tg2:['boom', 'patent']},
{id:'bike-light',r:18,icon:'🚲',name:'刹车感应智能尾灯',tg:'加速度计自动检测刹车 · 爆闪提醒后车 · 无线转向遥控',b:37,p:129,pr:5500,m:'43%',tg2:['boom', 'patent']},
{id:'bottle-band',r:19,icon:'🍼',name:'婴儿奶瓶温度指示环',tg:'套在任何奶瓶上 · 红/黄/绿 LED 一眼知温 · 不用手腕试温',b:14,p:69,pr:4200,m:'61%',tg2:['boom', 'patent']},
{id:'pet-fountain',r:20,icon:'🐱',name:'宠物饮水机智能监控器',tg:'电容水位感应 · 滤芯寿命提醒 · LED 灯环 · 夹上即用',b:24.5,p:89,pr:4500,m:'51%',tg2:['boom', 'patent']},
];
var cf='all';
function filter(f){cf=f;document.querySelectorAll('.filter-bar button').forEach(function(b,i){b.classList.toggle('active',f==='all'&&i===0||f==='boom'&&i===1||f==='patent'&&i===2||f==='both'&&i===3)});render();}
function render(){
  var h='';
  for(var i=0;i<D.length;i++){
    var d=D[i];if(cf!=='all'&&d.tg2.indexOf(cf)===-1)continue;
    var rk=d.rc?'rank '+d.rc:'rank';var rt=d.r<=3?'TOP '+d.r:'#'+d.r;
    var ts=d.tg2.map(function(t){return t==='boom'?'<span class="boom">🔥 爆品</span>':'<span class="patent">📜 专利</span>';}).join('');
    h+='<a href="detail.html?s='+d.id+'" class="card">'+
      '<div class="ct"><span class="'+rk+'">'+rt+'</span><span class="icon">'+d.icon+'</span></div>'+
      '<h3>'+d.name+'</h3><div class="tagline">'+d.tg+'</div>'+
      '<div class="metrics"><span>BOM <b>¥'+d.b+'</b></span><span>售价 <b>¥'+d.p+'</b></span><span>净利 <b>¥'+d.pr+'</b></span></div>'+
      '<div class="tags">'+ts+'</div><div class="arrow">查看完整调研 →</div></a>';
  }
  document.getElementById('cards').innerHTML=h;
}
render();
</script>
</body>
</html>
