<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>产品详情 · Product Lab</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
*,*::after,*::before{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--bg-card:rgba(12,20,35,.85);--line:rgba(0,180,255,.12);--line-act:rgba(0,212,255,.5);--cyan:#00d4ff;--cyand:rgba(0,212,255,.6);--cyans:rgba(0,212,255,.12);--blue:#0088ff;--purple:#7c3aed;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--pink:#ec4899;--txt:#e2e8f0;--txtd:#94a3b8;--txtm:#64748b;--sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);line-height:1.6;overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,212,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03)1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.glow{position:fixed;width:600px;height:600px;border-radius:50%;filter:blur(150px);pointer-events:none;z-index:0;animation:gp 8s ease infinite alternate}
.g1{top:-200px;right:-200px;background:radial-gradient(circle,rgba(0,100,255,.06),transparent)}
.g2{bottom:-200px;left:-200px;background:radial-gradient(circle,rgba(124,58,237,.05),transparent);animation-delay:-4s}
@keyframes gp{0%,100%{opacity:.5}50%{opacity:1}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--cyans);border-radius:3px}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:.8rem 2rem;background:linear-gradient(180deg,rgba(6,8,15,.95),transparent);display:flex;justify-content:space-between;align-items:center}
nav .logo{font-weight:700;font-size:1rem;background:linear-gradient(135deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
nav .back{color:var(--cyand);text-decoration:none;font-size:.78rem}
nav .back:hover{color:var(--cyan)}
.content{z-index:1;max-width:960px;margin:0 auto;padding:5rem 1.5rem 3rem}
.header{text-align:center;margin-bottom:2.5rem}
.header .icon{font-size:3rem;display:block;margin-bottom:.5rem}
.header h1{font-size:clamp(1.6rem,3vw,2.2rem);font-weight:800;margin-bottom:.3rem}
.header .tagline{font-size:.9rem;color:var(--txtd);margin-bottom:1rem}
.header .tags{display:flex;justify-content:center;gap:.5rem}
.header .tags span{font-size:.68rem;padding:.2rem .7rem;border-radius:12px;font-family:var(--mono)}
.t-boom{color:var(--amber);background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2)}
.t-patent{color:var(--pink);background:rgba(236,72,153,.1);border:1px solid rgba(236,72,153,.2)}
.concept-box{background:var(--bg-card);border:1px solid var(--line);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;text-align:center}
.concept-box h3{font-size:.7rem;color:var(--txtm);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-bottom:.8rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.8rem}
.mcard{background:var(--bg-card);border:1px solid var(--line);border-radius:14px;padding:1.2rem}
.mcard .ml{font-size:.62rem;color:var(--txtm);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem}
.mcard .mv{font-size:1.6rem;font-weight:800;font-family:var(--mono);color:var(--cyan)}
.mcard .mv .unit{font-size:.7rem;font-weight:400;color:var(--txtm)}
.mcard .sub{font-size:.68rem;color:var(--txtd);margin-top:.2rem}
.mcard .txt{font-size:.74rem;color:var(--txtd);line-height:1.7}
.mcard .txt b{color:var(--cyan);font-weight:600}
.mockup{display:flex;justify-content:center;padding:1rem 0}
.m-device{position:relative;display:inline-block}
.m-body{background:linear-gradient(160deg,#1a2740,#0d1525);border:2px solid rgba(255,255,255,.06);border-radius:20px;padding:18px 22px;box-shadow:0 8px 40px rgba(0,180,255,.06)}
.m-screen{background:#080c14;border-radius:12px;padding:16px 20px;border:1px solid rgba(0,212,255,.12);position:relative;overflow:hidden}
.m-screen .glow-reflect{position:absolute;top:-40%;left:-20%;width:60%;height:180%;background:linear-gradient(180deg,rgba(0,212,255,.04),transparent);transform:rotate(-12deg);pointer-events:none}
.m-label{font-size:.55rem;color:var(--txtm);text-align:center;margin-top:.8rem;font-family:var(--mono);letter-spacing:.04em}
.m-btn{display:inline-block;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:3px 10px;font-size:.55rem;color:var(--txtm);font-family:var(--mono)}
.m-btn.accent{background:rgba(0,212,255,.06);border-color:rgba(0,212,255,.2);color:var(--cyan)}
.m-led{display:inline-block;width:6px;height:6px;border-radius:50%;margin:0 2px}
.m-led.green{background:#10b981;box-shadow:0 0 6px rgba(16,185,129,.4)}
.m-led.amber{background:#f59e0b;box-shadow:0 0 6px rgba(245,158,11,.4)}
.m-grill{display:flex;gap:3px;justify-content:center;margin:8px 0}
.m-grill span{display:block;width:16px;height:2px;background:rgba(255,255,255,.06);border-radius:1px}
.m-knob{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#253550,#0d1525);border:2px solid rgba(255,255,255,.12);position:relative}
.m-knob::after{content:"";position:absolute;top:5px;left:50%;width:2px;height:8px;background:var(--cyand);border-radius:1px}
.comp-table{width:100%;border-collapse:collapse;font-size:.65rem}
.comp-table td,.comp-table th{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center}
.comp-table th{color:var(--txtm);font-weight:400;font-size:.58rem}
.comp-table .us{color:var(--cyan);font-weight:600}
.comp-table .win{color:#10b981;font-weight:600}
.why-item{margin-bottom:6px;line-height:1.6}
.waterfall{display:flex;height:20px;border-radius:4px;overflow:hidden;margin:8px 0}
.waterfall span{display:flex;align-items:center;justify-content:center;font-size:.5rem;color:#fff;font-family:var(--mono)}
.wf-bom{background:rgba(0,180,255,.5)}.wf-make{background:rgba(245,158,11,.5)}.wf-ship{background:rgba(236,72,153,.5)}.wf-fee{background:rgba(124,58,237,.4)}.wf-profit{background:rgba(16,185,129,.5)}
.persona{display:flex;align-items:center;gap:10px;margin:6px 0}
.persona .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem}
.ro-step{display:flex;align-items:center;gap:8px;margin:4px 0}
.ro-step .dot{width:8px;height:8px;border-radius:50%;background:var(--cyand);flex-shrink:0}
.ro-step .txt{font-size:.65rem;color:var(--txtd)}
.back-link{text-align:center;margin:2rem 0}
.back-link a{color:var(--cyand);text-decoration:none;font-size:.85rem;font-family:var(--mono)}
.back-link a:hover{color:var(--cyan)}
.foot{z-index:1;text-align:center;padding:2rem;color:var(--txtm);font-size:.7rem;border-top:1px solid rgba(255,255,255,.03)}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
@keyframes pulse2{0%,100%{opacity:.3}50%{opacity:1}}
@media(max-width:768px){.grid3,.grid2{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
